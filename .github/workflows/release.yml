name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test suite
        run: cargo test --workspace --all-targets --all-features -q

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux
            ext: ""
          - os: macos-latest
            os_name: macos
            ext: ""
          - os: windows-latest
            os_name: windows
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build CLI and LSP
        run: cargo build --release -p gust-cli -p gust-lsp

      - name: Package artifact (Unix)
        id: package_unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT="gust-${{ matrix.os_name }}-${{ runner.arch }}.tar.gz"
          mkdir -p dist
          cp target/release/gust dist/gust
          cp target/release/gust-lsp dist/gust-lsp
          tar -C dist -czf "${ARTIFACT}" gust gust-lsp
          echo "artifact=${ARTIFACT}" >> "${GITHUB_OUTPUT}"

      - name: Package artifact (Windows)
        id: package_windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "gust-${{ matrix.os_name }}-${{ runner.arch }}.zip"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/release/gust.exe" dist/gust.exe
          Copy-Item "target/release/gust-lsp.exe" dist/gust-lsp.exe
          Compress-Archive -Path dist/gust.exe, dist/gust-lsp.exe -DestinationPath $artifact -Force
          "artifact=$artifact" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package_unix.outputs.artifact || steps.package_windows.outputs.artifact }}
          path: ${{ steps.package_unix.outputs.artifact || steps.package_windows.outputs.artifact }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |
            const tag = '${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}';
            const { data: release } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
            });
            return release.body;

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: dist/*
          body: |
            ## Installation

            Download the archive for your platform, extract, and place `gust` and `gust-lsp` on your PATH.

            | Platform | Archive |
            |----------|---------|
            | Linux (x64) | `gust-linux-X64.tar.gz` |
            | macOS (ARM) | `gust-macos-ARM64.tar.gz` |
            | Windows (x64) | `gust-windows-X64.zip` |

            ## What's Changed

            ${{ steps.changelog.outputs.result }}
