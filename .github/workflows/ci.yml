name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check
      - name: Workspace check
        run: cargo check --workspace --all-targets
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Workspace tests
        run: cargo test --workspace --all-targets --all-features
      - name: Rustdoc (deny broken links and warnings)
        env:
          RUSTDOCFLAGS: "-D warnings -D rustdoc::broken_intra_doc_links"
        run: cargo doc --workspace --no-deps --all-features

  examples-and-go:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Example tests (event processor)
        run: cargo test --manifest-path examples/event_processor/Cargo.toml
      - name: Example tests (microservice)
        run: cargo test --manifest-path examples/microservice/Cargo.toml
      - name: Example tests (workflow engine)
        run: cargo test --manifest-path examples/workflow_engine/Cargo.toml

      - name: Go target smoke test + vet
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _ci_go_smoke
          cargo run -q -p gust-cli -- build examples/order_processor.gu --target go --output _ci_go_smoke --package smoke
          cat > _ci_go_smoke/go.mod <<'EOF'
          module smoke

          go 1.21
          EOF
          (cd _ci_go_smoke && go vet ./...)

  coverage:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 14
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  audit:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Run cargo audit
        run: cargo audit
